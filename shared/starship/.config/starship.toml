[directory]
truncate_to_repo = false
truncation_length = 0

[hostname]
ssh_only = false
format = "[@$hostname]($style) "
style = "bold green"

[username]
show_always = true
format = "[$user]($style) "
style_user = "bold cyan"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
